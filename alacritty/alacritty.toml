# Catppuccin Mocha

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

#Display
[window]
padding = { x = 10, y = 10 }

#Cursor
[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
blink_timeout = 5
unfocused_hollow = true

#Font
[font]
size = 12.0
builtin_box_drawing = true

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

#Scrolling
[scrolling]
history = 10000
multiplier = 3

#Optimizations
[debug]
render_timer = false
persistent_logging = false
log_level = "Warn"

